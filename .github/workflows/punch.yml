name: Kairos Punch

on:
  workflow_dispatch:
  schedule:
    - cron: "58 9 * * 1-5"
      timezone: "America/Sao_Paulo"
    - cron: "58 18 * * 1-5"
      timezone: "America/Sao_Paulo"

permissions: {}

concurrency:
  group: kairos-punch
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

jobs:
  punch:
    if: github.event_name == 'workflow_dispatch' || vars.KAIROS_AUTOMATION_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Punch morning schedule
        if: github.event_name == 'schedule' && github.event.schedule == '58 9 * * 1-5'
        env:
          KAIROS_EMAIL: ${{ secrets.KAIROS_EMAIL }}
          KAIROS_PASSWORD: ${{ secrets.KAIROS_PASSWORD }}
        run: npm run punch -- --schedule --target-slot morning

      - name: Punch evening schedule
        if: github.event_name == 'schedule' && github.event.schedule == '58 18 * * 1-5'
        env:
          KAIROS_EMAIL: ${{ secrets.KAIROS_EMAIL }}
          KAIROS_PASSWORD: ${{ secrets.KAIROS_PASSWORD }}
        run: npm run punch -- --schedule --target-slot evening

      - name: Punch manually
        if: github.event_name == 'workflow_dispatch'
        env:
          KAIROS_EMAIL: ${{ secrets.KAIROS_EMAIL }}
          KAIROS_PASSWORD: ${{ secrets.KAIROS_PASSWORD }}
        run: npm run punch
