name: Kairos Punch

on:
  workflow_dispatch:
    inputs:
      scheduled_run:
        description: Internal scheduler marker. Leave empty for manual runs.
        required: false
        default: ""
        type: string

permissions: {}

env:
  # Opt JavaScript-based GitHub actions into Node 24 before the platform default flips.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Keep native Date handling aligned with the Kairos BRT schedule during workflow execution.
  TZ: America/Sao_Paulo

concurrency:
  group: kairos-punch
  cancel-in-progress: ${{ inputs.scheduled_run == '' }}

jobs:
  punch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install-deps chromium
      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Punch (external scheduler)
        if: inputs.scheduled_run != ''
        env:
          KAIROS_EMAIL: ${{ secrets.KAIROS_EMAIL }}
          KAIROS_PASSWORD: ${{ secrets.KAIROS_PASSWORD }}
        run: npm run punch-scheduled

      - name: Punch (manual)
        if: inputs.scheduled_run == ''
        env:
          KAIROS_EMAIL: ${{ secrets.KAIROS_EMAIL }}
          KAIROS_PASSWORD: ${{ secrets.KAIROS_PASSWORD }}
        run: npm run punch
