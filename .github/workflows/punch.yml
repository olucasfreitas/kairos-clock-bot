name: Kairos Punch

on:
  workflow_dispatch:
  schedule:
    - cron: "59 9 * * 1-5"
      timezone: "America/Sao_Paulo"
    - cron: "59 18 * * 1-5"
      timezone: "America/Sao_Paulo"

concurrency:
  group: kairos-punch
  cancel-in-progress: true

jobs:
  punch:
    if: github.event_name == 'workflow_dispatch' || vars.KAIROS_AUTOMATION_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Punch
        env:
          KAIROS_EMAIL: ${{ secrets.KAIROS_EMAIL }}
          KAIROS_PASSWORD: ${{ secrets.KAIROS_PASSWORD }}
        run: npm run punch -- ${{ github.event_name == 'schedule' && '--schedule' || '' }}
